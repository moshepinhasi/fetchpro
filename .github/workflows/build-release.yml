name: Build & Release EXE

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller pillow requests customtkinter pystray plyer yt-dlp

      - name: Resolve icon (custom icon.ico / icon.png / any PNG, or generate default)
        run: python build_icon.py
        shell: pwsh

      - name: Build EXE with PyInstaller
        run: |
          pyinstaller `
            --onefile `
            --windowed `
            --icon=icon.ico `
            --name=FetchPro `
            --add-data="icon.ico;." `
            fetchpro.py
        shell: pwsh

      - name: Verify built files
        run: |
          if (!(Test-Path "dist\FetchPro.exe")) { throw "EXE not found!" }
          Write-Host "EXE size: $((Get-Item 'dist\FetchPro.exe').Length) bytes"
          if (Test-Path "FetchPro-Extension-v*.zip") {
            Write-Host "Extension ZIP found."
          } else {
            Write-Host "WARNING: No extension ZIP found in repo root."
          }
        shell: pwsh

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: FetchPro-${{ github.ref_name }}
          path: dist/FetchPro.exe

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: FetchPro ${{ github.ref_name }}
          body: |
            ## FetchPro ${{ github.ref_name }}

            ### הורדה
            - **FetchPro.exe** – הפעל ישירות, אין צורך בהתקנה.
            - **FetchPro-Extension-v1.3.zip** – תוסף Chrome: פתח את `chrome://extensions`, הפעל "Developer mode" וגרור את הקובץ לדף.

            ### שינויים
            ראה [CHANGELOG](CHANGELOG.md) לפרטים נוספים.
          files: |
            dist/FetchPro.exe
            FetchPro-Extension-*.zip
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
